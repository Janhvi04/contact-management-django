<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}CMA{% endblock %}</title>

  <!-- Bootstrap CSS (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(180deg, #f8f9fb 0%, #eef2f7 100%);
      min-height: 100vh;
    }
    .app-brand {
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .content-card {
      background: #ffffff;
      border: 1px solid #e9ecef;
      border-radius: 1rem;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.05);
      padding: 1.5rem;
    }
    .page-title {
      font-weight: 600;
      color: #1f2937;
    }
    .edit-form-wrapper p {
      margin-bottom: 1rem;
    }
    .edit-form-wrapper label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #374151;
    }
    .edit-form-wrapper input,
    .edit-form-wrapper select,
    .edit-form-wrapper textarea {
      width: 100%;
      display: block;
      border: 1px solid #ced4da;
      border-radius: 0.375rem;
      padding: 0.5rem 0.75rem;
      font-size: 1rem;
      line-height: 1.5;
      background-color: #fff;
    }
    .btn-interactive {
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }
    .btn-interactive:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(15, 23, 42, 0.12);
    }
    .btn-interactive:disabled {
      opacity: 0.8;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body class="d-flex flex-column">
  <nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm mt-3">
    <div class="container">
      <a class="navbar-brand app-brand text-primary" href="/list">Contact Manager</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <div class="ms-auto d-flex flex-column flex-lg-row gap-2 py-2 py-lg-0">
          <a href="/add" class="btn btn-primary px-4 btn-interactive">+ Add Contact</a>
          <a href="/list" class="btn btn-outline-primary px-4">View All Contact</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="container my-4 my-md-5 flex-grow-1">
    <div class="row justify-content-center">
      <div class="col-12 col-xl-10">
        <div class="content-card">
          {% block content %}{% endblock %}

          
            {% block body %}
    
            {% endblock body %}

  
        </div>
      </div>
    </div>
  </main>

  <!-- Bootstrap JS bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

  {% block extra_js %}{% endblock %}
</body>
</html>
